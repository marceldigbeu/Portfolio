<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENZI Logo Preview</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at top, #13284a 0%, #09111f 50%),
      linear-gradient(135deg, #07101e, #0e1728);
    font-family: Arial, sans-serif;
    color: #eaf2ff;
  }
  .frame {
    width: min(1100px, 92vw);
    padding: 28px;
    border: 1px solid #24324d;
    border-radius: 24px;
    background: rgba(7, 16, 30, 0.72);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  }
  img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 18px;
  }
  p {
    margin: 14px 4px 0;
    color: #9db0d0;
  }
</style>
</head>
<body>
  <div class="frame">
    <img src="enzi_logo.svg" alt="Logo ENZI">
    <p>Logo vectoriel ENZI. Utilisable dans les pages HTML, docs, bannières ou slides.</p>
  </div>
</body>
</html>
